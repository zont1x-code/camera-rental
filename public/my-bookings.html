<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>我的 - Camera Rental</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast" class="toast" style="display:none;"></div>

  <div class="container">
    <!-- 个人信息卡片 -->
    <div class="card" id="profileCard">
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-glow));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;" id="profileAvatar"></div>
        <div style="flex:1;">
          <div style="font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink);" id="profileName">未登录</div>
          <div style="font-size:13px;color:var(--muted);" id="profilePhone"></div>
        </div>
        <a href="/login.html" class="btn btn-outline btn-sm" id="loginBtn" style="flex-shrink:0;">登录</a>
      </div>
    </div>

    <!-- 菜单入口 -->
    <div class="card" style="padding:8px 0;">
      <div class="menu-item" onclick="navigate('orders')" id="menuBookings">
        <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="menu-text"><div class="menu-title">我的预约</div><div class="menu-sub">查看租赁记录与订单状态</div></div>
        <div class="menu-arrow">›</div>
      </div>
    </div>

    <!-- 预约列表区（默认隐藏，点菜单才显示） -->
    <div id="viewBookings" style="display:none;">
      <div style="display:flex;align-items:center;margin-bottom:16px;gap:10px;">
        <button class="btn btn-ghost" onclick="navigate('home')" style="background:var(--bg-white);color:var(--ink);border:1px solid var(--border-card);font-size:13px;padding:6px 16px;">← 返回</button>
        <span style="font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink);">我的预约</span>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;" id="statusTabs">
        <button class="btn btn-xs" style="background:var(--accent);color:#fff;" onclick="filterBookings('all')">全部</button>
        <button class="btn btn-xs btn-outline" onclick="filterBookings('pending')">待确认</button>
        <button class="btn btn-xs btn-outline" onclick="filterBookings('renting')">租赁中</button>
        <button class="btn btn-xs btn-outline" onclick="filterBookings('completed')">已完成</button>
      </div>
      <div id="bookingsContainer">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>

    <!-- 设置页面 -->
    <div id="viewSettings" style="display:none;">
      <div style="display:flex;align-items:center;margin-bottom:16px;gap:10px;">
        <button class="btn btn-ghost" onclick="navigate('home')" style="background:var(--bg-white);color:var(--ink);border:1px solid var(--border-card);font-size:13px;padding:6px 16px;">← 返回</button>
        <span style="font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink);">设置</span>
      </div>
      <div class="card" style="padding:8px 0;">
        <div class="menu-item">
          <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
          <div class="menu-text"><div class="menu-title">关于我们</div><div class="menu-sub">Camera Rental v1.0</div></div>
        </div>
        <div class="menu-item" onclick="showPrivacyPolicy()">
          <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
          <div class="menu-text"><div class="menu-title">隐私协议</div><div class="menu-sub">查看隐私政策</div></div>
          <div class="menu-arrow">›</div>
        </div>
      </div>
      <div class="card" style="padding:8px 0;margin-top:16px;">
        <div class="menu-item" onclick="doLogout()">
          <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
          <div class="menu-text"><div class="menu-title" style="color:#e74c3c;">退出登录</div></div>
        </div>
      </div>
    </div>

    <!-- 主页（菜单列表） -->
    <div id="viewHome">
      <div class="card" style="padding:8px 0;">
        <div class="menu-item" onclick="navigate('settings')">
          <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
          <div class="menu-text"><div class="menu-title">设置</div><div class="menu-sub">隐私政策、关于、退出登录</div></div>
          <div class="menu-arrow">›</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 续约弹窗 -->
  <div id="renewModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:440px;">
      <h3>续约申请（最多3天）</h3>
      <div id="renewCalendar"></div>
      <p style="margin-top:12px;font-size:14px;color:var(--ink2);">已选：<span id="renewRange">-</span></p>
      <p style="color:var(--accent);font-weight:600;" id="renewDaysInfo"></p>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn btn-primary" id="renewSubmitBtn" onclick="submitRenew()" disabled>提交续约申请</button>
        <button class="btn btn-outline" onclick="hideRenewModal()">取消</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    var renewOrderId=null,rCal={s:null,e:null,m:0,y:0,dd:{}},statusLabels={pending:'待确认',confirmed:'已确认',renting:'租赁中',completed:'已完成',renew_pending:'续约待确认',cancelled:'已取消'};

    // 更新个人信息
    function updateProfile(){if(currentUser){document.getElementById('profileName').textContent=currentUser.username||currentUser.phone;document.getElementById('profilePhone').textContent=currentUser.phone;document.getElementById('profileAvatar').textContent=(currentUser.username||currentUser.phone).charAt(0).toUpperCase();document.getElementById('loginBtn').style.display='none'}else{document.getElementById('loginBtn').style.display=''}}

    function navigate(view){location.hash=view}
    // Init
    switchView(location.hash.replace('#','')||'home');
    function switchView(view){
      var isHome=view==='home';
      document.getElementById('profileCard').style.display=isHome?'block':'none';
      document.getElementById('viewHome').style.display=isHome?'block':'none';
      document.getElementById('viewBookings').style.display=view==='orders'?'block':'none';
      document.getElementById('viewSettings').style.display=view==='settings'?'block':'none';
      if(view==='orders')loadMyBookings();
    }
    window.addEventListener('hashchange',function(){switchView(location.hash.replace('#','')||'home')});
    switchView(location.hash.replace('#','')||'home');

    var allMyBookings=[],currentFilter='all';
    async function loadMyBookings(){var c=document.getElementById('bookingsContainer');if(!currentUser){c.innerHTML='<div class="empty-state"><p style="color:var(--muted);">请先登录</p></div>';return}try{allMyBookings=await api('/api/my-bookings?phone='+currentUser.phone);filterBookings(currentFilter)}catch(e){c.innerHTML='<div class="empty-state"><p style="color:var(--muted);">加载失败</p><button class="btn btn-outline btn-sm" onclick="loadMyBookings()">重试</button></div>'}}
    function filterBookings(status){currentFilter=status;var c=document.getElementById('bookingsContainer');var bks=status==='all'?allMyBookings:allMyBookings.filter(function(b){return b.status===status});document.querySelectorAll('#statusTabs .btn-xs').forEach(function(b){b.className='btn btn-xs btn-outline'});var active=document.querySelector('#statusTabs .btn-xs[onclick*="'+status+'"]');if(active){active.className='btn btn-xs';active.style.background='var(--accent)';active.style.color='#fff'}if(!bks.length){c.innerHTML='<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><p>'+(status==='all'?'暂无预约记录':statusLabels[status]+'订单')+'</p><a href="/book.html" class="btn btn-primary" style="margin-top:16px;">去预约</a></div>';return}c.innerHTML='<div class="booking-list">'+bks.map(function(b){var canRenew=b.status==='confirmed'||b.status==='renting';return '<div class="booking-item"><div class="booking-info"><strong>'+esc(b.cameraModel)+'</strong><span>'+b.startDate+' ~ '+b.endDate+' | '+esc(b.name)+'</span></div><div style="display:flex;align-items:center;gap:12px;"><span class="status-tag status-'+b.status+'">'+(statusLabels[b.status]||b.status)+'</span>'+(canRenew?'<button class="btn btn-outline btn-sm" onclick="showRenewModal('+b.id+')">续约</button>':'')+(b.renewRequest&&b.renewRequest.status==='pending'?'<span style="font-size:11px;color:#ca8a04;">审核中</span>':'')+'</div></div>'}).join('')+'</div>'}

    async function showRenewModal(id){rCal.orderId=id;rCal.s=null;rCal.e=null;try{var bks=await api('/api/my-bookings?phone='+currentUser.phone);var o=bks.find(function(b){return b.id===id});if(!o){showToast('订单不存在','error');return}var cb=await api('/api/bookings?cameraId='+o.cameraId);rCal.dd={};cb.forEach(function(b){var s=new Date(b.startDate),e=new Date(b.endDate),d=new Date(s);while(d<=e){rCal.dd[d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())]=true;d.setDate(d.getDate()+1)}});var d2=new Date(o.startDate);while(d2<=new Date(o.endDate)){delete rCal.dd[d2.getFullYear()+'-'+pad(d2.getMonth()+1)+'-'+pad(d2.getDate())];d2.setDate(d2.getDate()+1)}var now=new Date();rCal.m=now.getMonth();rCal.y=now.getFullYear();renderRenewCal();document.getElementById('renewModal').style.display='flex'}catch(e3){showToast('加载失败','error')}}
    function hideRenewModal(){document.getElementById('renewModal').style.display='none';rCal.orderId=null}
    document.addEventListener('click',function(e){if(e.target.id==='renewModal')hideRenewModal()});
    function renderRenewCal(){var t=new Date(),ts2=t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate());var f=new Date(rCal.y,rCal.m,1),l=new Date(rCal.y,rCal.m+1,0),off=f.getDay(),total=l.getDate();var h='<div class="calendar-header"><button class="nav-btn" onclick="renewNav(-1)">&lt;</button><span>'+rCal.y+' 年 '+(rCal.m+1)+' 月</span><button class="nav-btn" onclick="renewNav(1)">&gt;</button></div><div class="weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div><div class="calendar-grid">';for(var i=0;i<off;i++)h+='<div class="calendar-day empty"></div>';for(var d=1;d<=total;d++){var dsv=rCal.y+'-'+pad(rCal.m+1)+'-'+pad(d),past=dsv<ts2,dis=rCal.dd[dsv]||past,cls='calendar-day';if(dis)cls+=' disabled';if(dsv===ts2)cls+=' today';if(rCal.s&&rCal.e&&dsv>=rCal.s&&dsv<=rCal.e){cls+=' selected';if(dsv===rCal.s&&dsv===rCal.e)cls+=' range-single';else if(dsv===rCal.s)cls+=' range-start';else if(dsv===rCal.e)cls+=' range-end';else cls+=' in-range'}else if(rCal.s&&dsv===rCal.s)cls+=' selected range-single';h+='<div class="'+cls+'" data-date="'+dsv+'">'+d+'</div>'}h+='</div>';document.getElementById('renewCalendar').innerHTML=h;document.querySelectorAll('#renewCalendar .calendar-day:not(.disabled):not(.empty)').forEach(function(el){el.addEventListener('click',function(){rCalClick(el.dataset.date)})})}
    function renewNav(dir){rCal.m+=dir;if(rCal.m<0){rCal.m=11;rCal.y--}if(rCal.m>11){rCal.m=0;rCal.y++}renderRenewCal()}
    function rCalClick(dsv){if(!rCal.s||(rCal.s&&rCal.e)){rCal.s=dsv;rCal.e=null}else{if(dsv<rCal.s){rCal.s=dsv;rCal.e=null}else{var days=Math.round((new Date(dsv)-new Date(rCal.s))/86400000)+1;if(days>3){showToast('续约最多3天','error');return}var d3=new Date(rCal.s);while(d3<=new Date(dsv)){var chk=d3.getFullYear()+'-'+pad(d3.getMonth()+1)+'-'+pad(d3.getDate());if(rCal.dd[chk]){showToast('所选日期已被预约','error');return}d3.setDate(d3.getDate()+1)}rCal.e=dsv}}renderRenewCal();updateRenewInfo()}
    function updateRenewInfo(){if(rCal.s&&rCal.e){var days=Math.round((new Date(rCal.e)-new Date(rCal.s))/86400000)+1;document.getElementById('renewRange').textContent=rCal.s+' ~ '+rCal.e+'（'+days+'天）';document.getElementById('renewDaysInfo').textContent='续约费用将按原订单价格计算';document.getElementById('renewSubmitBtn').disabled=false}else if(rCal.s){document.getElementById('renewRange').textContent='已选开始：'+rCal.s;document.getElementById('renewDaysInfo').textContent='';document.getElementById('renewSubmitBtn').disabled=true}else{document.getElementById('renewRange').textContent='-';document.getElementById('renewDaysInfo').textContent='';document.getElementById('renewSubmitBtn').disabled=true}}
    async function submitRenew(){if(!rCal.s||!rCal.e){showToast('请选择日期','error');return}try{await api('/api/renew',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderId:rCal.orderId,newStartDate:rCal.s,newEndDate:rCal.e})});showToast('续约申请已提交','success');hideRenewModal();loadMyBookings()}catch(e){showToast(e.message,'error')}}

    // 退出登录
    function doLogout(){localStorage.removeItem('userToken');localStorage.removeItem('userPhone');location.reload()}
    // 隐私协议
    async function showPrivacyPolicy(){try{var d=await api('/api/privacy');alert(d.content)}catch(e){}}

    function onLoginSuccess(){updateProfile()}
    initApp('mybookings');updateProfile();
  </script>
</body>
</html>
