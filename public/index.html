<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>春叶棠 · 相机租赁</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="hero-page">
  <div id="toast" class="toast" style="display:none;"></div>

  <section class="hero" id="heroEl">
    <div class="hero-slider" id="heroSlider"></div>
    <canvas id="heroCanvas"></canvas>
    <div class="hero-gradient"></div>
    <div class="hero-vignette"></div>
    <div class="hero-inner">
      <div class="hero-badge" id="heroBadgeEl">专业租赁 · 简单三步</div>
      <h1>租一台<span class="accent">相机</span><br>记录你的视角</h1>
      <p class="hero-sub">简单三步，专业器材触手可及。<br>从选机到取机，比你想象的更简单。</p>
      <div class="hero-actions">
        <a href="/book.html" class="btn btn-primary">开始预约</a>
        <a href="/discover.html" class="btn btn-ghost">浏览机型 →</a>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    (function(){var c=document.getElementById('heroCanvas'),h=document.getElementById('heroEl'),ctx=c.getContext('2d'),w,ht,t=0;function rs(){var r=h.getBoundingClientRect();w=c.width=r.width;ht=c.height=r.height}rs();window.addEventListener('resize',rs);var ff=[];for(var i=0;i<45;i++)ff.push({x:Math.random()*w,y:Math.random()*ht,bx:Math.random()*w,by:Math.random()*ht,r:Math.random()*2.2+.8,p:Math.random()*Math.PI*2,fx:Math.random()*.25+.08,fy:Math.random()*.2+.06,ax:Math.random()*80+30,ay:Math.random()*50+20,gp:Math.random()*Math.PI*2,gs:Math.random()*.7+.25});var ss=[];function sp(){ss.push({x:Math.random()*w*.7,y:Math.random()*ht*.25,vx:3.5+Math.random()*6,vy:1.5+Math.random()*2.5,l:1,d:.006+Math.random()*.012,len:80+Math.random()*120})}function dr(){ctx.clearRect(0,0,w,ht);t+=.016;for(var i=ss.length-1;i>=0;i--){var s=ss[i],g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*s.len*.015,s.y-s.vy*s.len*.015);g.addColorStop(0,'rgba(255,255,255,'+s.l+')');g.addColorStop(1,'rgba(255,255,255,0)');ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*s.len*.015,s.y-s.vy*s.len*.015);ctx.stroke();s.x+=s.vx;s.y+=s.vy;s.l-=s.d;if(s.l<=0)ss.splice(i,1)}for(var i=0;i<ff.length;i++){var f=ff[i];f.x=f.bx+Math.sin(t*f.fx+f.p)*f.ax;f.y=f.by+Math.cos(t*f.fy+f.p)*f.ay;var a=.3+.35*Math.sin(t*f.gs+f.gp);var gd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*7);gd.addColorStop(0,'rgba(255,220,130,'+a+')');gd.addColorStop(.25,'rgba(255,190,80,'+(a*.5)+')');gd.addColorStop(.6,'rgba(255,150,40,'+(a*.1)+')');gd.addColorStop(1,'rgba(255,150,40,0)');ctx.fillStyle=gd;ctx.beginPath();ctx.arc(f.x,f.y,f.r*7,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,245,210,'+(a*1.3)+')';ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill()}if(Math.random()<.005)sp();requestAnimationFrame(dr)}dr()})();
    // Hero 滑动轮播 — 手机/桌面自适应分辨率
    var heroImages=[],heroInterval=8000,pos=0,slideTimer;
    function heroImgUrl(url){
      // Unsplash 图片按屏幕宽度适配
      if(url.indexOf('unsplash.com')>0){
        var w=window.innerWidth>1200?2400:window.innerWidth>768?1600:1080;
        return url.replace(/w=\d+/,'w='+w);
      }
      return url;
    }
    async function loadHeroConfig(){
      try{var data=await api('/api/hero');
        if(data.badge)document.getElementById('heroBadgeEl').textContent=data.badge;
        heroInterval=(data.interval||8)*1000;
        heroImages=data.images||[];
        if(heroImages.length===1){var s=document.getElementById('heroSlider');s.style.width='100%';s.innerHTML='<div class="hero-slide" style="background-image:url('+heroImgUrl(heroImages[0])+');min-width:100%;"></div>'}
        else if(heroImages.length>=2)initSlider();
      }catch(e){}
    }
    function initSlider(){
      var slider=document.getElementById('heroSlider'),html='';
      for(var i=0;i<Math.min(4,heroImages.length);i++)html+='<div class="hero-slide" id="hs'+i+'" style="background-image:url('+heroImgUrl(heroImages[i])+');"></div>';
      slider.innerHTML=html;pos=0;
      if(heroImages.length>2)slideTimer=setTimeout(slideNext,heroInterval);
    }
    function slideNext(){
      var slider=document.getElementById('heroSlider');
      pos++;var n=heroImages.length;
      slider.classList.add('sliding');
      slider.style.transform='translateX(-50%)';
      setTimeout(function(){
        slider.classList.remove('sliding');
        slider.style.transform='translateX(0)';
        // shift: remove first, append next at end
        var first=document.getElementById('hs0');
        if(first)first.remove();
        var idx=(pos+1)%n;
        var next=document.createElement('div');next.className='hero-slide';
        next.style.backgroundImage='url('+heroImgUrl(heroImages[idx])+')';
        slider.appendChild(next);
        // re-id
        var els=slider.querySelectorAll('.hero-slide');
        els.forEach(function(el,i){el.id='hs'+i});
        slideTimer=setTimeout(slideNext,heroInterval);
      },2100);
    }
    loadHeroConfig();
    initApp('hero');
  </script>
</body>
</html>
