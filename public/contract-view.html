<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租赁合同</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body,html{width:100%;height:100%;overflow:hidden}
  iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
  <iframe id="pdfViewer"></iframe>
  <script>
    fetch('/api/contract').then(function(r){return r.json()}).then(function(d){
      if(d.file){document.getElementById('pdfViewer').src=d.file}
      else{document.body.innerHTML='<p style="padding:40px;text-align:center;color:#999;">暂无合同文件</p>'}
    }).catch(function(){document.body.innerHTML='<p style="padding:40px;text-align:center;color:#999;">加载失败</p>'})
  </script>
</body>
</html>
