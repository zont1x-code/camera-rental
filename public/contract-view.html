<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租赁合同 - 春叶棠</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#14141e;color:#e0e0e0;min-height:100vh;padding:32px 20px;line-height:1.8}
  .contract-container{max-width:700px;margin:0 auto;background:#1c1c28;border-radius:16px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,.3)}
  .contract-container h2{text-align:center;font-size:22px;font-weight:700;margin-bottom:28px;color:#fff;letter-spacing:.04em}
  .contract-content{white-space:pre-wrap;word-break:break-word;font-size:15px;color:#ccc;line-height:2}
  .contract-footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);font-size:13px;color:#666}
  .loading{padding:40px;text-align:center;color:#999}
</style>
</head>
<body>
<div class="contract-container">
  <h2>租赁合同协议</h2>
  <div id="content" class="loading">加载中...</div>
  <div class="contract-footer">春叶棠 · Camera Rental</div>
</div>
<script>
  fetch('/api/contract').then(function(r){return r.json()}).then(function(d){
    if(d.content){document.getElementById('content').className='contract-content';document.getElementById('content').textContent=d.content}
    else{document.getElementById('content').innerHTML='<p class="loading">暂无合同内容</p>'}
  }).catch(function(){document.getElementById('content').innerHTML='<p class="loading">加载失败</p>'})
</script>
</body>
</html>
