<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <h1>春叶棠 · Camera Rental</h1>
      <p class="login-subtitle">管理员登录</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <p id="loginError" class="login-error" style="display:none;"></p>
        <button type="submit" class="login-btn">登 录</button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.querySelector('.login-btn');
      btn.disabled = true;
      btn.textContent = '登录中...';

      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminRole', data.role);
        localStorage.setItem('adminUser', document.getElementById('username').value);
        window.location.href = data.role === 'supervisor' ? '/admin/supervisor.html' : '/admin/dashboard.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = data.error || '登录失败';
      }

      btn.disabled = false;
      btn.textContent = '登 录';
    });

    // Redirect if already logged in
    var savedRole = localStorage.getItem('adminRole');
    if (localStorage.getItem('adminToken')) {
      window.location.href = savedRole === 'supervisor' ? '/admin/supervisor.html' : '/admin/dashboard.html';
    }
  </script>
</body>
</html>
